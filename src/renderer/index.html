<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Daily Note</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Work Daily Note</h1>
      <p>记录零散事项，生成结构化日报文本</p>
    </div>
    <nav class="tabs" aria-label="主导航">
      <button class="tab active" data-route="notes">记录</button>
      <button class="tab" data-route="organize">整理</button>
      <button class="tab" data-route="settings">设置</button>
    </nav>
  </header>

  <main>
    <section id="notesView" class="view active record-view">
      <section class="record-panel card">
        <div class="section-title record-title">
          <div>
            <h2>今日事项流</h2>
            <p class="hint">打开即写，输入 `#项目名 内容` 可自动识别项目标签。</p>
          </div>
          <span id="noteCount" class="note-count">0 条</span>
        </div>
        <div id="notesList" class="notes-list chat-list" aria-live="polite"></div>
      </section>

      <form id="noteForm" class="card input-card composer-card">
        <label for="noteContent">快速记录</label>
        <div id="projectHint" class="project-hint" aria-live="polite">未识别项目标签</div>
        <div class="note-input-row">
          <textarea id="noteContent" rows="2" placeholder="例如：#移动端 调整列表筛选"></textarea>
          <button type="submit">保存</button>
        </div>
        <p id="enterHint" class="hint">Enter 保存，Shift + Enter 换行。保存失败时会保留输入。</p>
        <div class="category-row" id="categoryOptions"></div>
      </form>
    </section>

    <section id="organizeView" class="view">
      <section class="card organize-card">
        <div class="section-title">
          <div>
            <h2>整理日报</h2>
            <p id="organizeStatus" class="hint organize-status" role="status" aria-live="polite">准备整理今日事项。</p>
          </div>
          <button id="organizeButton" type="button">开始整理</button>
        </div>
        <p id="staleHint" class="stale-hint" hidden>事项已变化，可重新整理</p>
        <div class="result-tabs" role="tablist" aria-label="整理结果">
          <button class="result-tab active" type="button" data-result-tab="daily">日报文本</button>
          <button class="result-tab" type="button" data-result-tab="category">分类展示</button>
          <button class="result-tab" type="button" data-result-tab="project">项目展示</button>
        </div>
        <section id="dailyResultPanel" class="result-panel active" data-result-panel="daily">
          <label for="resultText">日报文本</label>
          <textarea id="resultText" rows="12" readonly></textarea>
          <div class="actions">
            <button id="copyButton" type="button">复制文本</button>
          </div>
        </section>
        <section id="categoryResultPanel" class="result-panel" data-result-panel="category">
          <div id="summaryList" class="summary-list"></div>
        </section>
        <section id="projectResultPanel" class="result-panel" data-result-panel="project">
          <div id="projectSummaryList" class="summary-list"></div>
        </section>
      </section>
    </section>

    <section id="settingsView" class="view">
      <form id="settingsForm" class="card settings-form">
        <h2>AI 与提醒设置</h2>
        <fieldset class="settings-section">
          <legend>基础设置</legend>
          <label for="apiBaseUrl">OpenAI 兼容接口地址</label>
          <input id="apiBaseUrl" type="url" placeholder="https://api.example.com/v1">
          <label for="apiKey">API Key</label>
          <input id="apiKey" type="password" autocomplete="off" placeholder="只保存在本机配置">
          <label for="model">模型名</label>
          <input id="model" type="text" placeholder="gpt-4.1-mini">
          <label for="reminderTime">提醒时间</label>
          <input id="reminderTime" type="time" value="18:00">
        </fieldset>
        <button id="advancedSettingsToggle" class="secondary advanced-toggle" type="button" aria-expanded="false" aria-controls="advancedSettingsPanel">高级设置</button>
        <section id="advancedSettingsPanel" class="advanced-settings" hidden>
          <label for="dailyTemplate">日报模板</label>
          <textarea id="dailyTemplate" rows="5"></textarea>
          <label for="projectRules">项目识别规则</label>
          <textarea id="projectRules" rows="3"></textarea>
          <label for="startupPage">启动页</label>
          <select id="startupPage">
            <option value="notes">记录</option>
            <option value="organize">整理日报</option>
            <option value="settings">设置</option>
          </select>
          <label for="enterBehavior">Enter 行为</label>
          <select id="enterBehavior">
            <option value="save">Enter 保存，Shift + Enter 换行</option>
            <option value="newline">Enter 换行，Ctrl/⌘ + Enter 保存</option>
          </select>
          <label for="reminderStrategy">提醒策略</label>
          <select id="reminderStrategy">
            <option value="confirm">到点先确认今日事项</option>
            <option value="organize">到点直接进入整理页</option>
            <option value="off">关闭本机提醒</option>
          </select>
        </section>
        <button type="submit">保存设置</button>
      </form>
    </section>
  </main>

  <div id="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
