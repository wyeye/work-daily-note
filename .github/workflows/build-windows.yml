name: Build Windows

on:
  push:
    branches:
      - master
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri Windows installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build -- --verbose --ci

      - name: Create updater latest.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/create-updater-latest-json.js src-tauri/target/release/bundle/nsis updater-release/latest.json

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: work-daily-note-windows-${{ github.ref_name }}
          path: |
            src-tauri/target/release/bundle/nsis/*
            updater-release/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: updater-release/*
          body: Work Daily Note ${{ github.ref_name }}
