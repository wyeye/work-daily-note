name: Build Windows

on:
  push:
    branches:
      - master
    tags:
      - v*
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri Windows installer
        run: npm run tauri:build -- --verbose --ci

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: work-daily-note-windows-${{ github.ref_name }}
          path: src-tauri/target/release/bundle/nsis/*
